<!DOCTYPE html>
<html>

<head>
<title>IFSAS AI Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f4c81,#2c7be5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.loginbox{

background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:340px;
text-align:center;

}

.logo{

height:70px;
margin-bottom:20px;

}

h2{

margin-bottom:20px;

}

input{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;

}

button{

width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;

}

button:hover{

background:#0056b3;

}

.footer{

margin-top:20px;
font-size:12px;
color:#888;

}

</style>

</head>

<body>

<div class="loginbox">

<img src="/static/logo.png" class="logo">

<h2>IFSAS AI Stock Assistant</h2>

<form method="POST">

<input name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

<div class="footer">
IFSAS Security Systems - GT®
</div>

</div>

</body>

</html>
